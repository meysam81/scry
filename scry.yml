crawl:
  max_depth: 5
  max_pages: 200
  concurrency: 8
  respect_robots: true
  exclude:
    - "/admin/*"
    - "/api/*"

output:
  formats:
    - terminal
    - json
  file: ./audit-report
  fail_on: critical

lighthouse:
  enabled: false
  mode: psi
  strategy: mobile

browser:
  enabled: false
  browserless_url: http://localhost:3000

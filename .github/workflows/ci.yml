name: ci

concurrency:
  cancel-in-progress: ${{ ! startsWith(github.ref, 'refs/tags/') }}
  group: ci-${{ github.ref_name }}-${{ github.event_name }}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  prettier:
    if: contains(fromJson('["pull_request","push"]'), github.event_name)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Run Prettier
        run: bunx prettier@v3 -w .
      - name: Commit if changed
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "The following files were changed by prettier:"
            git status --porcelain

            git config user.name "github-actions[bot]"
            git config user.email "${{ github.actor_id }}+github-actions@users.noreply.github.com"
            git add .
            git commit -m "chore: format code with prettier" -m 'skip ci'
            git fetch origin "$HEAD_REF"
            git rebase "origin/$HEAD_REF"
            git push origin "HEAD:$HEAD_REF"
          else
            echo "No changes to commit"
          fi

  checks:
    if: contains(fromJson('["pull_request","push"]'), github.event_name)
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ./go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9


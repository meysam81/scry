name: ci

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
      - name: Run tests
        run: go test ./... -count=1 -timeout 120s
